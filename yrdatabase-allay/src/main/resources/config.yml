# YRDatabase Configuration for Allay
# Database mode: standalone (single server) or proxy (WaterdogPE cluster)
mode: standalone

# Cache configuration (Redis)
cache:
  enabled: true
  type: redis
  host: localhost
  port: 6379
  password: ""
  database: 0
  timeout: 5000
  pool:
    maxTotal: 20
    maxIdle: 10
    minIdle: 2

# Persistence configuration (MySQL/SQLite)
persist:
  enabled: true
  type: sqlite  # sqlite or mysql
  
  mysql:
    host: localhost
    port: 3306
    database: yrdatabase
    username: root
    password: ""
    timezone: Asia/Shanghai
    pool:
      maxSize: 10
      minIdle: 2
      connectionTimeout: 30000
      idleTimeout: 600000
      maxLifetime: 1800000
  
  sqlite:
    file: data/yrdatabase.db

# Caching behavior
caching:
  # Redis key 默认存活时长（秒）。必须 > sweepIntervalSeconds，否则 key 在首次扫描前就过期。
  defaultTTL: 3600

  playerDataTTL: 7200

  # 在线玩家 TTL 自动续期
  # 当 Redis key 剩余 TTL ≤ refreshThreshold 秒且玩家在线时，自动将 TTL 重置为 defaultTTL。
  # 约束：sweepIntervalSeconds ≤ refreshThreshold（否则续期扫描可能赶不上 key 过期）
  autoRefresh: true
  refreshThreshold: 300

  # 离线玩家数据自动持久化
  # 当 Redis key 剩余 TTL ≤ autoSyncIntervalSeconds 秒且玩家离线时，触发写入 MySQL/SQLite。
  # 约束：sweepIntervalSeconds ≤ autoSyncIntervalSeconds（否则持久化扫描可能赶不上 key 过期）
  autoSyncEnabled: true
  autoSyncIntervalSeconds: 300

  # pending 集合扫描间隔（秒）。
  # 必须同时满足以下三个约束，违反时启动时会打 WARN 日志：
  #   sweepIntervalSeconds ≤ refreshThreshold        （保证续期扫描及时触发）
  #   sweepIntervalSeconds ≤ autoSyncIntervalSeconds  （保证持久化扫描及时触发）
  #   defaultTTL > sweepIntervalSeconds               （保证 key 至少能被扫到一次）
  # 推荐值：min(refreshThreshold, autoSyncIntervalSeconds) 的一半
  sweepIntervalSeconds: 30

# Session management
session:
  timeout: 300000
  heartbeatInterval: 10000
  messageExpiry: 30000

# Advanced settings
advanced:
  asyncExecutorSize: 4
  enableMetrics: false
  debugMode: false
