# YRDatabase Configuration for NukkitMOT

# Mode: standalone (single server) or proxy (with WaterdogPE)
mode: standalone

# Cache layer (Redis) - Optional but recommended for proxy mode
cache:
  enabled: false
  host: localhost
  port: 6379
  password: ""
  database: 0
  timeout: 5000
  pool:
    maxTotal: 20
    maxIdle: 10
    minIdle: 2

# Persistence layer (MySQL or SQLite)
persist:
  enabled: true
  # Type: mysql or sqlite
  type: sqlite
  
  mysql:
    host: localhost
    port: 3306
    database: yrdatabase
    username: root
    password: ""
    timezone: UTC
    pool:
      maxSize: 10
      minIdle: 2
      connectionTimeout: 30000
      idleTimeout: 600000
      maxLifetime: 1800000
  
  sqlite:
    # Relative to plugin data folder, or absolute path
    file: data.db

# Caching settings
caching:
  # Redis key 默认存活时长（秒）。必须 > sweepIntervalSeconds，否则 key 在首次扫描前就过期。
  defaultTTL: 3600
  playerDataTTL: 7200

  # 在线玩家 TTL 自动续期
  # 约束：sweepIntervalSeconds ≤ refreshThreshold
  autoRefresh: true
  refreshThreshold: 300

  # 离线玩家数据自动持久化
  # 约束：sweepIntervalSeconds ≤ autoSyncIntervalSeconds
  autoSyncEnabled: true
  autoSyncIntervalSeconds: 300

  # pending 集合扫描间隔（秒）。
  # 必须同时满足：
  #   sweepIntervalSeconds ≤ refreshThreshold
  #   sweepIntervalSeconds ≤ autoSyncIntervalSeconds
  #   defaultTTL > sweepIntervalSeconds
  # 推荐：min(refreshThreshold, autoSyncIntervalSeconds) 的一半
  sweepIntervalSeconds: 30

# Session management
session:
  timeout: 300000         # 5 minutes in ms
  heartbeatInterval: 10000  # 10 seconds in ms

# Advanced settings
advanced:
  asyncExecutorSize: 4
  enableMetrics: false
  debugMode: false
